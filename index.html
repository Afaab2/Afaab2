<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOL SURVIVAL Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .game-screen {
            background: #ffffff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            background: #35424a;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #3c4b5a;
        }
    </style>
</head>
<body>
    <header>
        <h1>SOL SURVIVAL Game</h1>
    </header>
    <div class="container">
        <div class="game-screen">
            <h2>Welcome to SOL SURVIVAL!</h2>
            <p>Use your skills to survive in an alien environment.</p>
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>
    <script>
        function startGame() {
            alert('The game has started!');
            // Here you would initialize the game logic.
        }
    </script>
</body>
</html>
